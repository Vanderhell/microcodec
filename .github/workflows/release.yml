name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Create source archive directory
        run: |
          mkdir -p release
          git archive --format=tar.gz --output=release/microcodec-${GITHUB_REF_NAME}.tar.gz HEAD
          git archive --format=zip --output=release/microcodec-${GITHUB_REF_NAME}.zip HEAD

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/*.zip
          generate_release_notes: true
